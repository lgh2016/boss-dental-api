server:
  port: ${SERVER_PORT:8081}
  error:
    include-stacktrace: never

spring:
  application:
    name: boss-dental-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/boss_dental}
    username: ${DB_USERNAME:boss_dental_user}
    password: ${DB_PASSWORD:boss_dental_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG