services:
  boss-dental-db:
    image: postgres:17
    container_name: boss-dental-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - boss_dental_postgres_data:/var/lib/postgresql/data

volumes:
  boss_dental_postgres_data: